<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="frontend" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#61DAFB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#20232A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="backend" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#512BD4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0078D4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="database" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0078D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#004E8C;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="#F5F5F5"/>
  
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="Arial" font-size="24" font-weight="bold" fill="#333">Nhyira Haven - Tech Stack Architecture</text>
  
  <!-- Frontend Layer -->
  <rect x="200" y="70" width="400" height="120" rx="10" fill="url(#frontend)" opacity="0.9"/>
  <text x="400" y="100" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">FRONTEND</text>
  <text x="400" y="125" text-anchor="middle" font-family="Arial" font-size="14" fill="white">React + Vite + TypeScript</text>
  <text x="400" y="145" text-anchor="middle" font-family="Arial" font-size="12" fill="#E0E0E0">Tailwind CSS • React Router • Axios</text>
  <text x="400" y="165" text-anchor="middle" font-family="Arial" font-size="12" fill="#E0E0E0">Azure Static Web Apps</text>
  
  <!-- Arrow -->
  <line x1="400" y1="190" x2="400" y2="220" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="410" y="210" font-family="Arial" font-size="11" fill="#666">HTTPS/TLS</text>
  
  <!-- Backend Layer -->
  <rect x="200" y="230" width="400" height="120" rx="10" fill="url(#backend)" opacity="0.9"/>
  <text x="400" y="260" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">BACKEND API</text>
  <text x="400" y="285" text-anchor="middle" font-family="Arial" font-size="14" fill="white">.NET 10 Web API</text>
  <text x="400" y="305" text-anchor="middle" font-family="Arial" font-size="12" fill="#E0E0E0">ASP.NET Identity • Entity Framework Core</text>
  <text x="400" y="325" text-anchor="middle" font-family="Arial" font-size="12" fill="#E0E0E0">Azure App Service</text>
  
  <!-- Arrow -->
  <line x1="400" y1="350" x2="400" y2="380" stroke="#333" stroke-width="2"/>
  <polygon points="400,380 395,370 405,370" fill="#333"/>
  <text x="410" y="370" font-family="Arial" font-size="11" fill="#666">EF Core</text>
  
  <!-- Database Layer -->
  <rect x="200" y="390" width="400" height="120" rx="10" fill="url(#database)" opacity="0.9"/>
  <text x="400" y="420" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">DATABASE</text>
  <text x="400" y="445" text-anchor="middle" font-family="Arial" font-size="14" fill="white">Azure SQL Database</text>
  <text x="400" y="465" text-anchor="middle" font-family="Arial" font-size="12" fill="#E0E0E0">17+ Tables • Seeded Data</text>
  <text x="400" y="485" text-anchor="middle" font-family="Arial" font-size="12" fill="#E0E0E0">Azure Key Vault (Secrets)</text>
  
  <!-- Security Box -->
  <rect x="50" y="520" width="340" height="70" rx="5" fill="#4A5568" opacity="0.9"/>
  <text x="220" y="545" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">🔒 SECURITY</text>
  <text x="220" y="565" text-anchor="middle" font-family="Arial" font-size="11" fill="#E0E0E0">HTTPS/TLS • Role-Based Access • GDPR • CSP Headers</text>
  
  <!-- Classes Box -->
  <rect x="410" y="520" width="340" height="70" rx="5" fill="#2D3748" opacity="0.9"/>
  <text x="580" y="545" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">📚 CLASS REQUIREMENTS</text>
  <text x="580" y="565" text-anchor="middle" font-family="Arial" font-size="11" fill="#E0E0E0">IS 401 (PM) • IS 413 (Dev) • IS 414 (Security) • IS 455 (ML)</text>
  
  <!-- Data Flow Arrow (side) -->
  <path d="M 150 130 Q 100 130 100 300 Q 100 470 150 470" stroke="#4A5568" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  <text x="60" y="300" font-family="Arial" font-size="11" fill="#4A5568" transform="rotate(-90 60 300)">Data Flow</text>
</svg>